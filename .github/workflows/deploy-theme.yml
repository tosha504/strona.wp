name: Deploy Theme via FTPS (SmartHost)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: deploy-hochusala-theme
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Jeśli budujesz assets w CI — odkomentuj:
      # - name: Setup Node
      #   uses: actions/setup-node@v6
      #   with:
      #     node-version: "24"
      #     cache: "npm"
      #
      # - name: Install & Build
      #   run: |
      #     npm ci
      #     npm run build

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          port: ${{ secrets.FTP_PORT }}
          protocol: ftps
          local-dir: ./
          server-dir: ${{ secrets.FTP_PATH }}
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
            **/.DS_Store
            **/*.log